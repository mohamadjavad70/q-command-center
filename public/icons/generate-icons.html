<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Q Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">
<h3>Q Icon Generator — آیکون Q را ذخیره کنید</h3>
<p>روی هر آیکون کلیک راست کنید → Save image as...</p>

<div style="display:flex;gap:20px;flex-wrap:wrap">
  <div>
    <canvas id="c192" width="192" height="192"></canvas>
    <p>192×192</p>
    <button onclick="download('c192','icon-192.png')">Download 192×192</button>
  </div>
  <div>
    <canvas id="c512" width="512" height="512"></canvas>
    <p>512×512</p>
    <button onclick="download('c512','icon-512.png')">Download 512×512</button>
  </div>
</div>

<script>
function drawQ(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const cx = s/2, cy = s/2, r = s * 0.42;

  // Background
  const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, s*0.7);
  bg.addColorStop(0, '#000510');
  bg.addColorStop(1, '#000002');
  ctx.fillStyle = bg;
  roundRect(ctx, 0, 0, s, s, s*0.16);
  ctx.fill();

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,242,255,0.2)';
  ctx.lineWidth = s*0.003;
  ctx.stroke();

  // Neural particles
  const particles = 36;
  for (let i = 0; i < particles; i++) {
    const angle = (i / particles) * Math.PI * 2;
    const rad = r * (0.6 + Math.random() * 0.35);
    const px = cx + Math.cos(angle) * rad;
    const py = cy + Math.sin(angle) * rad;
    ctx.beginPath();
    ctx.arc(px, py, s*0.005, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,242,255,0.7)';
    ctx.fill();
  }

  // Core glow
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, s*0.18);
  glow.addColorStop(0, 'rgba(0,242,255,0.35)');
  glow.addColorStop(1, 'rgba(0,242,255,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, s*0.18, 0, Math.PI*2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Core circle
  ctx.beginPath();
  ctx.arc(cx, cy, s*0.12, 0, Math.PI*2);
  ctx.fillStyle = '#001122';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,242,255,0.85)';
  ctx.lineWidth = s*0.005;
  ctx.stroke();

  // Q Letter
  ctx.font = `${s*0.18}px "Segoe UI", Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#00f2ff';
  ctx.fillText('Q', cx, cy + s*0.01);

  // Swiss flag (bottom right)
  const fx = s * 0.84, fy = s * 0.84, fw = s * 0.12;
  ctx.fillStyle = 'rgba(220,0,0,0.9)';
  roundRect(ctx, fx, fy, fw, fw, fw*0.15);
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.fillRect(fx + fw*0.41, fy + fw*0.12, fw*0.18, fw*0.76);
  ctx.fillRect(fx + fw*0.12, fy + fw*0.41, fw*0.76, fw*0.18);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function download(id, filename) {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

drawQ(document.getElementById('c192'));
drawQ(document.getElementById('c512'));
</script>
<p style="margin-top:20px;font-size:12px;opacity:0.6">
  پس از دانلود، فایل‌ها را در پوشه <code>public/icons/</code> قرار دهید.
</p>
</body>
</html>
